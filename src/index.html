<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background: #333;
            color: white;
            padding: 1rem;
        }

        main {
            padding: 2rem;
        }

        footer {
            background: #333;
            color: white;
            padding: 1rem;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <main>
        <h2>Hello World 👋</h2>
        <p>This is a basic HTML page.</p>
        <button onclick="sayHello()">Click Me</button>
    </main>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

    <script>
        function sayHello() {
            alert("Hello! You clicked the button.");
        }
    </script>

</body>
</html>
